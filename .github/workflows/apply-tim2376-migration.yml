name: TIM-2376 Apply multi-project schema migration (one-shot)

# One-shot workflow — trigger manually, then delete.
# Applies supabase/migrations/20260605152347_multi_project_capability.sql to production.
# Required secret: SUPABASE_DB_URL

on:
  workflow_dispatch:

jobs:
  apply-migration:
    name: Apply TIM-2376 multi-project schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pg driver
        run: npm install --no-save pg

      - name: Apply migration + verify
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: node scripts/apply-tim2376-migration.mjs
