name: Smoke tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  link-check:
    name: Check internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-links.mjs
