name: Smoke tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  link-check:
    name: Check internal links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: node scripts/check-links.mjs

  normalize-lint:
    name: AI content normalization gate (TIM-1356)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint:normalize

  normalize-tests:
    name: Normalize unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # TIM-2994: bumped 20→22. The test file is .mjs but imports
          # src/lib/normalize.ts; Node 20 throws ERR_UNKNOWN_FILE_EXTENSION on
          # .ts because --experimental-strip-types was added in 22.6.
          node-version: "22"
      - run: node --experimental-strip-types --no-warnings --test --test-reporter=spec src/lib/normalize.test.mjs

  playwright-smoke:
    name: Playwright smoke (TIM-1357)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Start app
        run: npm start &
        env:
          PORT: 3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Wait for app to be ready
        # TIM-2994: use TCP port check instead of HTTP GET. Next.js logs
        # "✓ Ready in 136ms" the moment it binds, but wait-on http://...
        # was timing out because middleware returns a 307 redirect to
        # /login for unauth requests, which wait-on treats as not-ready.
        # `tcp:3000` succeeds the instant the listener is up.
        run: npx wait-on tcp:3000 --timeout 180000

      - name: Run smoke tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
          PAPERCLIP_API_URL: ${{ secrets.PAPERCLIP_API_URL }}
          PAPERCLIP_API_KEY: ${{ secrets.PAPERCLIP_API_KEY }}
          # TIM-2994: pass PR body via env var, NOT ${{ }} template inlined
          # into the shell. Inlining lets any backtick / $(...) / shell
          # special char in a PR description execute as code — Rule 3
          # (server-side validate all user input).
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          ISSUE=$(printf '%s' "$PR_BODY" | grep -oP 'SMOKE_ISSUE=\K\S+' || true)
          if [ -n "$ISSUE" ]; then
            export SMOKE_ISSUE="$ISSUE"
          fi
          npm run test:smoke

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: |
            tests/__screenshots__/
            playwright-report.json
          retention-days: 14

      - name: Upload diffs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-diffs
          path: test-results/
          retention-days: 7

  lighthouse:
    name: Lighthouse a11y ≥ 90 + perf ≥ 90 (TIM-1357)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Start app
        run: npm start &
        env:
          PORT: 3000
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Wait for app to be ready
        # TIM-2994: use TCP port check instead of HTTP GET. Next.js logs
        # "✓ Ready in 136ms" the moment it binds, but wait-on http://...
        # was timing out because middleware returns a 307 redirect to
        # /login for unauth requests, which wait-on treats as not-ready.
        # `tcp:3000` succeeds the instant the listener is up.
        run: npx wait-on tcp:3000 --timeout 180000

      - name: Run Lighthouse CI
        run: |
          npx lhci autorun \
            --collect.url=http://localhost:3000/ \
            --collect.url=http://localhost:3000/pricing \
            --collect.url=http://localhost:3000/login
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
