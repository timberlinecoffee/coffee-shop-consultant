name: TIM-2361 Apply ai_turn_metrics migration (one-shot)

# One-shot workflow — trigger manually, then delete after apply.
# Applies the TIM-2361 ai_turn_metrics DDL to production Supabase via
# Supavisor v2 aws-1 pooler (TIM-2376). Workflow must live on main to be
# dispatchable.
# Required secret: SUPABASE_DB_URL

on:
  workflow_dispatch:

jobs:
  apply-migration:
    name: Apply TIM-2361 ai_turn_metrics
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pg driver
        run: npm install --no-save pg

      - name: Apply migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: node scripts/apply-tim2361-migration.mjs
